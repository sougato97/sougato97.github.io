<body>
  <div class="page-frame">
    <header class="hero" id="top">
      <nav class="topbar" aria-label="Primary">
        <a class="brand" href="#top" id="site-brand">Portfolio</a>
        <div class="nav-links">

        </button>

      <section class="hero-grid" id="hero-content">
        <p class="lede">Loading profile...</p>
      </section>
    </header>

    <main>
      <section class="metric-strip" aria-label="Key highlights" id="highlights-content"></section>

      <section class="section" id="blog">
        <div id="blog-content"></div>
      </section>

      <section class="section" id="focus">
        <div id="focus-content"></div>
      </section>

      <section class="section" id="work">
        <div id="work-content"></div>
      </section>

      <section class="section" id="experience">
        <div id="experience-content"></div>
      </section>

      <section class="section" id="archive">
        <div id="archive-content"></div>

    </footer>
